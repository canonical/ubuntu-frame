name: Refresh downstreams

on:
  push:
    branches:
    - main
  workflow_dispatch:

permissions: {}

jobs:
  Refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    timeout-minutes: 5

    strategy:
      fail-fast: false
      matrix:
        ref:
        - mir-libs-build

    steps:
    - name: Drop LFS
      run: |
        sudo apt-get remove --yes git-lfs

    - name: Check out code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        # so that we know what to cherry-pick from
        fetch-depth: 2
        persist-credentials: false

    - name: Update `${{ matrix.ref }}`
      env:
        GIT_COMMITTER_NAME: "Mir CI Bot"
        GIT_COMMITTER_EMAIL: "mir-ci-bot@canonical.com"
      run: |
        # bring mir-libs changes in
        git fetch origin ${{ matrix.ref }}
        git cherry-pick HEAD..origin/${{ matrix.ref }}

        git push --force https://${{ github.token }}@github.com/${{ github.repository }}.git HEAD:${{ matrix.ref }}
